// V3 envelope manifest. Embedded inside the C1Z3 file format after
// the 5-byte magic and a uint32 BE length prefix.
//
// The manifest pins a transitively-closed FileDescriptorSet of every
// c1.storage.v3 record type stored in the payload. This is what makes
// v3 c1z files self-describing — any reader, including one without the
// originating SDK's compiled-in protos, can resolve every field via
// dynamicpb against the sidecar descriptor set.
//
// See RFC v4 §3.2 and Appendix B for the full envelope spec.

syntax = "proto3";

package c1.c1z.v3;

import "c1/storage/v3/records.proto";
import "google/protobuf/any.proto";
import "google/protobuf/descriptor.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/conductorone/baton-sdk/pb/c1/c1z/v3";

message C1ZManifestV3 {
  // Engine identifier. "pebble" is the only value Stack 3 supports.
  // Future engines (e.g. "sled") can dispatch on this string without
  // an envelope change.
  string engine = 1;

  // Engine-specific schema version. Pebble interprets this as the
  // pinned format-major-version it was written under; mismatches at
  // open surface as ErrPebbleFormatNewer (refuse, page on-call) or
  // ErrPebbleFormatOlder (refuse, treat as corruption).
  uint32 engine_schema_version = 2;

  // Engine-specific configuration. For Pebble, this carries
  // PebbleEngineConfig. The reader looks up the Any type-URL against
  // its compiled-in registry; unknown type-URLs are treated as
  // "no hint" (advisory only — the dispatch key is `engine`).
  google.protobuf.Any engine_config = 3;

  // Payload encoding. PAYLOAD_ENCODING_TAR_ZSTD is the production
  // default for Pebble engines.
  PayloadEncoding payload_encoding = 4;

  // Transitively-closed FileDescriptorSet of every record type stored
  // in the payload. Built at write time by walking
  // protoregistry.GlobalFiles. The reader verifies closure at open
  // and returns ErrManifestIncompleteDescriptors if any record-type
  // descriptor cannot resolve from this set alone.
  google.protobuf.FileDescriptorSet descriptors = 10;

  // Record types produced by this writer. Used by the reader to
  // detect unknown record types (forward-compat with a future SDK
  // that adds new record types this binary doesn't know).
  repeated RecordTypeInfo record_types = 11;

  // Cheap projection of sync runs inside the payload — lets tooling
  // enumerate without opening the engine.
  repeated SyncRunSummary sync_runs = 40;

  // Cumulative raw bytes of records (and their derived index keys)
  // shadowed by in-place fold compactions since the last rebuild.
  // Fold splices the base's compressed frames verbatim at save, so an
  // overridden record's bytes stay inside the output as dead weight;
  // this counter is the exact accounting of that waste, carried
  // forward across consecutive folds (the dest store inherits it from
  // the file it was opened from, and each fold adds its own delta).
  // A rebuild (overlay / kway) writes a fresh store and resets it to
  // zero. The compactor's auto mode reads this from the envelope
  // header to force a rebuild once waste crosses its threshold.
  int64 fold_dead_bytes = 41;

  // Advisory mirror of the Pebble in-payload grant/entitlement ID/index format.
  // The Pebble engine-meta stamp remains authoritative; this header field lets
  // tooling inspect legacy-vs-structured index state without extracting the
  // Pebble payload.
  PebbleIdIndexFormat pebble_id_index_format = 42;

  // Whole-file grant digest root: the XOR fold of every per-entitlement
  // grant-digest root's content-hash XOR in the file's single sync (i.e.
  // the fold of every entitlement's digest, not just entitlements with
  // grants), plus the total grant count. Lets a consumer answer "did
  // anything change?" from a header read alone, without unpacking the
  // Pebble payload. Absent means "no digest built for this file" (older
  // writers, or a file whose digest state was invalidated after the
  // last save) — never "zero grants"; see
  // c1/dotc1z/engine/pebble/digest.go's present-means-exact contract.
  // Additive field: old readers ignore it, old files simply lack it.
  GrantDigestRoot grant_digest_root = 43;
}

// GrantDigestRoot is the whole-file grant digest: present iff the
// engine successfully built grant digests for the file's sync (seal
// time, or a compaction that ran the same build). See
// c1.c1z.v3.C1ZManifestV3.grant_digest_root.
message GrantDigestRoot {
  // XOR of every grant's content hash in the sync. hashLen (8) bytes.
  bytes xor_digest = 1;
  // Total grant count the digest was built over.
  int64 count = 2;
  // Version of the grant content-hash / bucket-hash ABI (grant_digest.go)
  // this root was computed under. A future ABI bump changes this, which
  // makes roots computed under different versions incomparable by
  // construction instead of silently comparing unrelated hash schemes.
  uint32 abi_version = 3;
}

enum PebbleIdIndexFormat {
  PEBBLE_ID_INDEX_FORMAT_UNSPECIFIED = 0;
  PEBBLE_ID_INDEX_FORMAT_LEGACY_EXTERNAL_ID = 1;
  PEBBLE_ID_INDEX_FORMAT_STRUCTURED_V1 = 2;
}

enum PayloadEncoding {
  PAYLOAD_ENCODING_UNSPECIFIED = 0;

  // Tar of a Pebble directory, compressed with zstd. The
  // production default in older v3 writers.
  PAYLOAD_ENCODING_TAR_ZSTD = 1;

  // Tar of a Pebble directory, uncompressed. For tenants whose
  // Pebble L5/L6 SSTs are already zstd-compressed at the engine
  // layer and want to avoid double-compression CPU at envelope
  // time, or for object-storage targets that compress in-transit.
  PAYLOAD_ENCODING_TAR = 2;

  // 3 and 4 are skipped: pre-release dev builds briefly used them
  // with conflicting meanings. Don't reuse.
  reserved 3, 4;

  // Per-file zstd frames written back-to-back, indexed by a trailing
  // IndexedFrameIndex and fixed-size footer (see that message for
  // the layout). No tar layer, no per-frame inline headers.
  //
  // Enables (a) parallel frame decode at open — the single-stream
  // encodings decode sequentially on one core; (b) frame splicing at
  // save: a writer that knows a payload file is byte-identical to one
  // in the source envelope copies its compressed frame verbatim
  // instead of re-encoding (Pebble SSTs are immutable and checkpoints
  // hard-link them, so incremental folds reuse almost every frame);
  // and (c) chunked object storage: the index carries every frame's
  // byte range and SHA-256 content identity, so a store can upload
  // only the frames a parent sync doesn't already hold.
  PAYLOAD_ENCODING_INDEXED_ZSTD = 5;
}

// IndexedFrameIndex is the sole frame table for
// PAYLOAD_ENCODING_INDEXED_ZSTD payloads. It is serialized (binary
// proto) immediately after the last frame, followed by a fixed-size
// footer carrying the index's absolute file offset, length, xxh64,
// and a trailing magic:
//
//	payload := frame* | index | footer
//	footer  := u64 indexOffset | u32 indexLen | u64 xxh64(index) | "C1ZIDX1\0"
//
// Frames carry no framing of their own — each is the bare zstd
// stream of one payload file, with Frame_Content_Size advertised —
// so the writer is single-pass (streamable to a non-seekable sink)
// and a frame's byte range is directly usable as a standalone
// object. The whole table is fetchable in O(1) reads — footer, then
// index — which is what makes ranged reads over object storage
// practical: fetch exactly the frames you want, no per-frame round
// trips. A payload without a valid footer is corruption-class, the
// same policy as a torn tar payload.
//
// Being a proto message, the index is the extension point for future
// per-frame metadata (compression algorithm, dictionary IDs,
// encryption) without a layout revision.
message IndexedFrameIndex {
  repeated IndexedFrameEntry entries = 1;
  // Sum of raw_size over entries. Lets a reader budget extraction
  // without summing.
  int64 total_raw_size = 2;
  // Sum of compressed_size over entries.
  int64 total_compressed_size = 3;
  // xxh64 of the marshaled manifest bytes (the region between the
  // length prefix and the first frame). The manifest is otherwise
  // the only unprotected byte region — frames carry zstd CRCs and
  // raw-byte hashes, the index is covered by the footer's xxh64 —
  // and the header-only manifest decode skips the descriptor
  // closure, so a flipped bit there would otherwise go unnoticed.
  // Also lets a chunked store verify reassembly of the envelope
  // head. Zero means "not recorded".
  fixed64 manifest_xxh64 = 4;
}

message IndexedFrameEntry {
  // Slash-separated relative path of the payload file, identical to
  // the name in the frame's inline header.
  string name = 1;
  // Absolute offset of the frame's compressed zstd bytes from the
  // start of the envelope file (NOT from the payload start), so a
  // ranged read needs no other context.
  int64 frame_offset = 2;
  int64 compressed_size = 3;
  int64 raw_size = 4;
  // xxh64 of the raw (decompressed) bytes. Matches the inline
  // header; used for corruption detection and splice matching.
  fixed64 raw_xxh64 = 5;
  // SHA-256 of the raw bytes. Content-address identity for chunked
  // object storage: compressed bytes are not stable across encoder
  // versions, and xxh64 is too weak to key a fleet-wide chunk store.
  //
  // REQUIRED: readers reject entries whose value is not exactly 32
  // bytes. Writers must always compute it, even when content
  // addressing is not in play — a partially-identified index can't
  // serve chunk dedupe later, and allowing absence would let
  // truncated identities propagate through frame splicing. A future
  // writer that genuinely cannot afford SHA-256 should introduce a
  // new payload encoding (or footer version) rather than omit this.
  bytes raw_sha256 = 6;
}

message RecordTypeInfo {
  // Proto FullName — e.g. "c1.storage.v3.GrantRecord".
  string message_full_name = 1;
  // Record-type-specific schema version. Bumped on any incompatible
  // change to the record's stored encoding; reader refuses files
  // claiming a version > what it supports.
  uint32 schema_version = 2;
  // Optional row-count hint for sizing readers.
  int64 estimated_count = 3;
}

message SyncRunSummary {
  string sync_id = 1;
  c1.storage.v3.SyncType type = 2;
  google.protobuf.Timestamp started_at = 3;
  google.protobuf.Timestamp ended_at = 4;
  string parent_sync_id = 5;
  // Projection of the engine's stats sidecar for this sync, when one
  // exists. Lets readers (compaction source selection, overlay bucket
  // planning, tooling) get row counts from the envelope header without
  // unpacking the payload. Absent for syncs whose sidecar was never
  // written (e.g. interrupted syncs).
  c1.storage.v3.SyncStatsRecord stats = 6;
}

// PebbleEngineConfig is the value placed inside C1ZManifestV3.engine_config
// when engine == "pebble". Type-URL: type.googleapis.com/c1.c1z.v3.PebbleEngineConfig.
message PebbleEngineConfig {
  // Pinned Pebble format-major-version this file was written under.
  // The reader compares against pebble.FormatNewest and pebble.FormatMinSupported.
  uint32 format_major_version = 1;
  // Hint to readers; advisory only.
  uint64 cache_size_bytes = 2;
}
