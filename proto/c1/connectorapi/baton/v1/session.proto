syntax = "proto3";

package c1.connectorapi.baton.v1;

import "validate/validate.proto";

option go_package = "gitlab.com/ductone/c1/pkg/pb/c1/connectorapi/baton/v1";

service BatonSessionService {
  rpc Get(BatonServiceGetRequest) returns (BatonServiceGetResponse) {}

  rpc GetMany(BatonServiceGetManyRequest) returns (BatonServiceGetManyResponse) {}

  rpc Set(BatonServiceSetRequest) returns (BatonServiceSetResponse) {}

  rpc SetMany(BatonServiceSetManyRequest) returns (BatonServiceSetManyResponse) {}

  rpc Delete(BatonServiceDeleteRequest) returns (BatonServiceDeleteResponse) {}

  rpc DeleteMany(BatonServiceDeleteManyRequest) returns (BatonServiceDeleteManyResponse) {}

  rpc Clear(BatonServiceClearRequest) returns (BatonServiceClearResponse) {}
}

message BatonServiceGetRequest {
  string sync_id = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]{27}$"}];

  string key = 2 [(validate.rules).string = {
    min_len: 1
    max_len: 256
  }];
}

message BatonServiceGetResponse {
  bytes value = 1;
}

message BatonServiceGetManyRequest {
  string sync_id = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]{27}$"}];

  repeated string keys = 2 [(validate.rules).repeated = {
    min_items: 1
    max_items: 200
    unique: true
    items: {
      string: {
        min_len: 1
        max_len: 256
      }
    }
  }];
}

message BatonServiceGetManyResponse {
  map<string, bytes> values = 1 [(validate.rules).map = {
    keys: {
      string: {
        min_len: 1
        max_len: 256
      }
    }
    values: {
      bytes: {
        min_len: 1
        max_len: 1048576
      }
    }
  }];
}

message BatonServiceGetAllRequest {
  string sync_id = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]{27}$"}];
}

message BatonServiceSetRequest {
  string sync_id = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]{27}$"}];
  string key = 2 [(validate.rules).string = {
    min_len: 1
    max_len: 256
  }];
  bytes value = 3 [(validate.rules).bytes = {
    min_len: 1
    max_len: 1048576
  }];
}

message BatonServiceSetResponse {} 

message BatonServiceSetManyRequest {
  string sync_id = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]{27}$"}];
  map<string, bytes> values = 2 [(validate.rules).map = {
    keys: {
      string: {
        min_len: 1
        max_len: 256
      }
    }
    values: {
      bytes: {
        min_len: 1
        max_len: 1048576
      }
    }
  }];
}

message BatonServiceSetManyResponse {}

message BatonServiceDeleteRequest {
  string sync_id = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]{27}$"}];
  string key = 2 [(validate.rules).string = {
    min_len: 1
    max_len: 256
  }];
}

message BatonServiceDeleteResponse {}

message BatonServiceDeleteManyRequest {
  string sync_id = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]{27}$"}];
  repeated string keys = 2 [(validate.rules).repeated = {
    min_items: 1
    max_items: 200
    items: {
      string: {
        min_len: 1
        max_len: 256
      }
    }
  }];
}
message BatonServiceDeleteManyResponse {}

message BatonServiceClearRequest {
  string sync_id = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]{27}$"}];
}

message BatonServiceClearResponse {}

