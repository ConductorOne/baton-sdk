syntax = "proto3";

package c1.connectorapi.baton.v1;

option go_package = "gitlab.com/ductone/c1/pkg/pb/c1/connectorapi/baton/v1";

// SessionCacheService provides gRPC operations for session cache management.
service SessionCacheService {
  // Get retrieves a value from the cache by namespace and key.
  rpc Get(GetRequest) returns (GetResponse);
  
  // GetMany retrieves multiple values from the cache by namespace and keys.
  rpc GetMany(GetManyRequest) returns (GetManyResponse);
  
  // Set stores a value in the cache with the given namespace and key.
  rpc Set(SetRequest) returns (SetResponse);
  
  // SetMany stores multiple values in the cache with the given namespace.
  rpc SetMany(SetManyRequest) returns (SetManyResponse);
  
  // Delete removes a value from the cache by namespace and key.
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  
  // Clear removes all values from the cache.
  rpc Clear(ClearRequest) returns (ClearResponse);
  
  // GetAll returns all key-value pairs in a namespace.
  rpc GetAll(GetAllRequest) returns (GetAllResponse);
}

// GetRequest represents a request to get a value from the cache.
message GetRequest {
  // SyncId is the identifier for the current sync operation.
  string sync_id = 1;
  
  // Namespace is the namespace of the cache entry.
  string namespace = 2;
  
  // Key is the key of the cache entry.
  string key = 3;
}

// GetResponse represents a response from a get operation.
message GetResponse {
  // Value is the cached data.
  bytes value = 1;
  
  // Found indicates whether the key was found in the cache.
  bool found = 2;
}

// SetRequest represents a request to set a value in the cache.
message SetRequest {
  // SyncId is the identifier for the current sync operation.
  string sync_id = 1;
  
  // Namespace is the namespace of the cache entry.
  string namespace = 2;
  
  // Key is the key of the cache entry.
  string key = 3;
  
  // Value is the data to cache.
  bytes value = 4;
}

// SetResponse represents a response from a set operation.
message SetResponse {
  // Success indicates whether the operation was successful.
  bool success = 1;
}

// DeleteRequest represents a request to delete a value from the cache.
message DeleteRequest {
  // SyncId is the identifier for the current sync operation.
  string sync_id = 1;
  
  // Namespace is the namespace of the cache entry.
  string namespace = 2;
  
  // Key is the key of the cache entry.
  string key = 3;
}

// DeleteResponse represents a response from a delete operation.
message DeleteResponse {
  // Success indicates whether the operation was successful.
  bool success = 1;
}

// ClearRequest represents a request to clear all values from the cache.
message ClearRequest {
  // SyncId is the identifier for the current sync operation.
  string sync_id = 1;
}

// ClearResponse represents a response from a clear operation.
message ClearResponse {
  // Success indicates whether the operation was successful.
  bool success = 1;
}

// GetAllRequest represents a request to get all values in a namespace.
message GetAllRequest {
  // SyncId is the identifier for the current sync operation.
  string sync_id = 1;
  
  // Namespace is the namespace to retrieve all entries from.
  string namespace = 2;
}

// GetAllResponse represents a response from a getAll operation.
message GetAllResponse {
  // Values is a map of key to value for all entries in the namespace.
  map<string, bytes> values = 1;
}

// GetManyRequest represents a request to get multiple values from the cache.
message GetManyRequest {
  // SyncId is the identifier for the current sync operation.
  string sync_id = 1;
  
  // Namespace is the namespace of the cache entries.
  string namespace = 2;
  
  // Keys is the list of keys to retrieve.
  repeated string keys = 3;
}

// GetManyResponse represents a response from a getMany operation.
message GetManyResponse {
  // Values is a map of key to value for the requested keys.
  map<string, bytes> values = 1;
}

// SetManyRequest represents a request to set multiple values in the cache.
message SetManyRequest {
  // SyncId is the identifier for the current sync operation.
  string sync_id = 1;
  
  // Namespace is the namespace of the cache entries.
  string namespace = 2;
  
  // Values is a map of key to value to store.
  map<string, bytes> values = 3;
}

// SetManyResponse represents a response from a setMany operation.
message SetManyResponse {
  // Success indicates whether the operation was successful.
  bool success = 1;
} 