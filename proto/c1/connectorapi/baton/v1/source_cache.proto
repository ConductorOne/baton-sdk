syntax = "proto3";

package c1.connectorapi.baton.v1;

import "validate/validate.proto";

option go_package = "gitlab.com/ductone/c1/pkg/pb/c1/connectorapi/baton/v1";

// BatonSourceCacheService is a dedicated parent-side RPC the connector
// subprocess uses to ask "do I have a previous etag for this scope?"
// before issuing a conditional HTTP request.
//
// This is intentionally NOT routed through the session-store gRPC service:
//
//   - The previous design tunneled lookups through `BatonSessionService.Get`
//     using a reserved key prefix and intercepted the keys on the parent
//     side. That worked for transport but had two real costs:
//       1. The connector's local `MemorySessionCache` (otter) wrapped the
//          tunneled keys as if they were ordinary connector session data,
//          burning the cache's bounded weight on sync-only state and
//          subjecting etags to the cache's TTL/eviction policy.
//       2. Etags went through a generic Get([]byte) API, so every lookup
//          paid the cost of marshaling an opaque blob and decoding it on
//          the other side.
//
//   - With a dedicated service the message shape is explicit, no memory
//     cache wraps the path, and the parent can serve from the source-cache
//     reference c1z (or the same c1z if we're consuming our own previous
//     sync) without any reserved-key intercept code.
service BatonSourceCacheService {
  rpc Lookup(LookupRequest) returns (LookupResponse) {}
}

message LookupRequest {
  // Row kind: resources / entitlements / grants. The parent stores
  // source-cache entries partitioned by row kind so a given scope hash
  // can refer to a different etag per kind.
  string row_kind = 1 [(validate.rules).string = {
    min_len: 1
    max_len: 64
  }];

  // Hex-encoded sha256 of the connector-defined scope tuple. The parent
  // never interprets this; it's an opaque identity supplied by the
  // connector and matched verbatim against `source_cache_entries`. The
  // parent has exactly one active Lookup at a time (set per-sync via
  // SetSourceCache on BatonSourceCacheServiceServer), so no sync_id is
  // needed on the wire.
  string scope_hash = 2 [(validate.rules).string = {
    pattern: "^[a-f0-9]{64}$"
  }];
}

message LookupResponse {
  // False means no prior entry exists for this (row_kind, scope_hash) on
  // the parent's currently-registered Lookup. The connector should issue
  // an unconditional request.
  bool found = 1;

  // The opaque source-cache key recorded by the previous sync. The
  // connector echoes this back on a cache-hit reply via the
  // SourceCacheReplayRequest annotation so the parent can copy the
  // stored rows verbatim. Empty when `found` is false.
  string source_cache_key = 2 [(validate.rules).string = {max_len: 1024}];

  // The etag the previous sync recorded for this scope. The connector
  // attaches this as an `If-None-Match` header on its conditional
  // request. Empty when `found` is false.
  string source_etag = 3 [(validate.rules).string = {max_len: 1024}];
}
