syntax = "proto3";

package c1.connector.v2;

import "c1/connector/v2/asset.proto";
import "c1/connector/v2/resource.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";

option go_package = "github.com/conductorone/baton-sdk/pb/c1/connector/v2";

message UserTrait {
  message Email {
    string address = 1 [(validate.rules).string = {email: true}];
    // Indicates if this is the user's primary email. Only one entry can be marked as primary.
    bool is_primary = 2;
  }
  repeated Email emails = 1;

  message Status {
    enum Status {
      STATUS_UNSPECIFIED = 0;
      STATUS_ENABLED = 1;
      STATUS_DISABLED = 2;
      STATUS_DELETED = 3;
    }
    Status status = 1 [(validate.rules).enum = {defined_only: true}];
    string details = 2 [(validate.rules).string = {
      ignore_empty: true
      min_bytes: 1
      max_bytes: 1024
    }];
  }
  Status status = 2 [(validate.rules).message = {required: true}];
  google.protobuf.Struct profile = 3;
  c1.connector.v2.AssetRef icon = 4;

  enum AccountType {
    ACCOUNT_TYPE_UNSPECIFIED = 0;
    ACCOUNT_TYPE_HUMAN = 1;
    ACCOUNT_TYPE_SERVICE = 2;
    ACCOUNT_TYPE_SYSTEM = 3;
  }
  AccountType account_type = 5 [(validate.rules).enum = {defined_only: true}];

  // The user's login
  string login = 6;
  // Any additional login aliases for the user
  repeated string login_aliases = 7;

  repeated string employee_ids = 13;

  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp last_login = 9;

  message MFAStatus {
    bool mfa_enabled = 1;
  }
  message SSOStatus {
    bool sso_enabled = 1;
  }
  MFAStatus mfa_status = 10;
  SSOStatus sso_status = 11;

  message StructuredName {
    string given_name = 1;
    string family_name = 2;
    repeated string middle_names = 3;
    string prefix = 4;
    string suffix = 5;
  }
  StructuredName structured_name = 12;
}

message GroupTrait {
  c1.connector.v2.AssetRef icon = 1;
  google.protobuf.Struct profile = 2;
}

message RoleTrait {
  google.protobuf.Struct profile = 1;
  RoleScopeConditions role_scope_conditions = 2;
}

message RoleScopeConditions {
  string type = 1;
  repeated RoleScopeCondition conditions = 3;
}

message RoleScopeCondition {
  string expression = 1;
}

// ScopeBindingTrait is used to scope a role to a resource or set of resources.
// The scope may be static (determined at crawl time) or dynamic (determined based on conditions).
// For example, in Azure a role definition can be scoped to a subscription, management group, or resource group.
// In that case, the role ID would be the resource ID of the role definition, and the scope resource ID would be the resource ID of the subscription, management group, or resource group.
message ScopeBindingTrait {
  c1.connector.v2.ResourceId role_id = 1 [(validate.rules).message = {required: true}]; // The role that is scoped. Must be a resource with the role trait.
  // Remove required if we add more ways to scope roles. (eg: Expressions.)
  c1.connector.v2.ResourceId scope_resource_id = 2 [(validate.rules).message = {required: true}]; // The resource that the role is scoped to.
}

message AppTrait {
  string help_url = 1 [(validate.rules).string = {
    min_bytes: 1
    max_bytes: 1024
    uri: true
    prefix: "https://"
    ignore_empty: true
  }];
  c1.connector.v2.AssetRef icon = 2;
  c1.connector.v2.AssetRef logo = 3;
  google.protobuf.Struct profile = 4;
  enum AppFlag {
    APP_FLAG_UNSPECIFIED = 0;
    APP_FLAG_HIDDEN = 1;
    APP_FLAG_INACTIVE = 2;
    APP_FLAG_SAML = 3;
    APP_FLAG_OIDC = 4;
    APP_FLAG_BOOKMARK = 5;
  }
  repeated AppFlag flags = 5;
}

message SecretTrait {
  // CredentialType is the cryptographic class of the secret, independent of
  // the platform-specific kind, which is carried in credential_detail.
  enum CredentialType {
    CREDENTIAL_TYPE_UNSPECIFIED = 0;
    CREDENTIAL_TYPE_STATIC_SECRET = 1;
    CREDENTIAL_TYPE_ASYMMETRIC_KEY = 2;
    CREDENTIAL_TYPE_CERTIFICATE = 3;
  }

  google.protobuf.Struct profile = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp expires_at = 3;
  google.protobuf.Timestamp last_used_at = 4;
  connector.v2.ResourceId created_by_id = 5;
  connector.v2.ResourceId identity_id = 6;
  CredentialType credential_type = 7 [(validate.rules).enum = {defined_only: true}];
  // Platform-specific credential kind (e.g. "aws_access_key", "ssh_key",
  // "x509"). Free-form; refines credential_type.
  string credential_detail = 8;
}

// LicenseProfileTrait is the trait annotation for resources with
// TRAIT_LICENSE_PROFILE. A license-profile resource represents a
// vendor-defined seat or plan that users on the connector can hold
// (e.g. Microsoft "E3", Atlassian "Business Plus"). The entitlements listed
// in entitlement_ids identify, on this connector, the grants that mean
// "the principal holds this license seat" — typically the membership
// entitlement of a license-backing group/role.
message LicenseProfileTrait {
  // Human-readable license name (e.g. "Enterprise", "Business Plus", "E3").
  string license_name = 1 [(validate.rules).string = {
    max_bytes: 1024
    ignore_empty: true
  }];
  // Total seats from the vendor API. Zero when not available.
  int64 purchased_seats = 2;
  // Consumed seats from the vendor API. Zero when not available.
  int64 consumed_seats = 3;
  // Optional per-seat cost from the vendor API. Zero when not available.
  int64 cost_per_unit_in_cents = 4;
  // ISO 4217 currency code. Defaults to "USD" when unset.
  string currency = 5 [(validate.rules).string = {
    max_bytes: 8
    ignore_empty: true
  }];
  // Entitlements on this connector that indicate a user holds this seat.
  repeated string entitlement_ids = 6 [(validate.rules).repeated = {unique: true}];
}

// NonHumanIdentityTrait marks a resource as a non-human identity (NHI). It is
// kind-agnostic: it rides the resource's annotations bag rather than living on
// a single trait field, so it can attach to a TRAIT_APP resource (e.g. an app
// registration) and a TRAIT_ROLE resource (e.g. an assumable role) alike.
message NonHumanIdentityTrait {
  enum NhiType {
    NHI_TYPE_UNSPECIFIED = 0;
    NHI_TYPE_APP_REGISTRATION = 1;
    NHI_TYPE_ASSUMABLE_ROLE = 2;
  }
  NhiType nhi_type = 1 [(validate.rules).enum = {defined_only: true}];
  // Platform-specific type detail; refines nhi_type when the source
  // distinguishes finer classes than the enum captures.
  string nhi_detail = 2;
}

// ActsOnBehalfOf identifies the principal an agent acts as. Exactly one arm is
// set. This is an open oneof: additional arms (e.g. end-user passthrough) may
// be added additively in the future.
message ActsOnBehalfOf {
  oneof on_behalf_of {
    // The system/service identity the agent runs as.
    connector.v2.ResourceId system_identity = 1;
    // The owning user identity the agent acts on behalf of.
    connector.v2.ResourceId owner_identity = 2;
  }
}

// AgentTrait is the trait annotation for resources with TRAIT_AGENT. An agent
// is an autonomous non-human actor (e.g. an AI agent) that holds an identity
// and may act on behalf of a system or user.
message AgentTrait {
  enum AgentStatus {
    AGENT_STATUS_UNSPECIFIED = 0;
    AGENT_STATUS_READY = 1;
    AGENT_STATUS_DISABLED = 2;
    AGENT_STATUS_DELETED = 3;
  }
  AgentStatus status = 1 [(validate.rules).enum = {defined_only: true}];
  // The identity resource this agent authenticates as.
  connector.v2.ResourceId identity_resource_id = 2;
  // The principal this agent acts on behalf of.
  ActsOnBehalfOf acts_on_behalf_of = 3;
  google.protobuf.Struct profile = 4;
}

// AgentToolTrait is the trait annotation for resources with TRAIT_AGENT_TOOL.
// An agent tool is a capability an agent can invoke (a callable tool or a
// knowledge base). The platform-specific kind is carried in
// agent_tool_detail, not in the AgentToolType enum.
message AgentToolTrait {
  enum AgentToolType {
    AGENT_TOOL_TYPE_UNSPECIFIED = 0;
    AGENT_TOOL_TYPE_TOOL = 1;
    AGENT_TOOL_TYPE_KNOWLEDGE_BASE = 2;
  }
  AgentToolType agent_tool_type = 1 [(validate.rules).enum = {defined_only: true}];
  // The credential provider this tool authenticates through.
  connector.v2.ResourceId credential_provider_ref = 2;
  // The resource that owns/exposes this tool.
  connector.v2.ResourceId owning_resource_ref = 3;
  // Platform-specific tool kind (free-form); refines agent_tool_type.
  string agent_tool_detail = 4;
  google.protobuf.Struct profile = 5;
}
