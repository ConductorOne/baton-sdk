syntax = "proto3";

package c1.connector.v2;

option go_package = "github.com/conductorone/baton-sdk/pb/c1/connector/v2";

// ProvisionFailureDetail describes WHY a Grant or Revoke failure is permanent.
// Connectors attach this to gRPC status details (via status.WithDetails) on
// errors returned from Grant/Revoke when the underlying upstream API has
// indicated the failure will not succeed on retry without external state
// change.
//
// The canonical signal callers act on is still the gRPC status code: when
// the upstream is permanently rejecting the operation, the connector should
// pick the matching code (FailedPrecondition for "state-blocked",
// PermissionDenied for "not permitted", etc.). This message *supplements*
// that with a structured reason and human-readable detail so callers can
// log, tag metrics, and route admin-facing remediation text consistently
// across connectors.
//
// For transient failures (5xx, network blip, rate limit), return errors as
// normal — those are retryable. Rate-limit-specific signaling has its own
// annotation (RateLimitDescription).
message ProvisionFailureDetail {
  enum Reason {
    REASON_UNSPECIFIED = 0;

    // The target user is in a state that the upstream system does not
    // permit modifications against. Examples: Okta SUSPENDED / DEPROVISIONED
    // / pending password reset (E0000038); Workday INACTIVE; locked AD
    // account. Resolves when the user's status changes upstream.
    REASON_USER_NOT_PROVISIONABLE = 1;

    // The target entitlement (group / role / queue / etc.) is governed by
    // an external rule that the connector cannot override. Examples: Okta
    // group rule (E0000001 groupMembers); AD group policy; Workday
    // delivered security group. Resolves when the rule is changed or the
    // subject is moved out of the rule's source set.
    REASON_TARGET_MANAGED_EXTERNALLY = 2;

    // CAPACITY problem: the upstream system has run out of seats /
    // licenses / quota for this operation. Examples: Jira "exceeds
    // number of allowed users licensed"; Salesforce license type cap;
    // Okta seat limit. Resolves when seats free up or the tenant
    // purchases more. Use this only for numerical capacity; for
    // capability or feature toggles, prefer REASON_OPERATION_NOT_PERMITTED.
    REASON_LICENSE_EXHAUSTED = 3;

    // Upstream API validation rejected the operation for a reason that
    // won't change on retry: malformed reference, schema-level
    // invariant. Use this for non-categorized terminal validation
    // failures. (For policy-driven rejection where the upstream itself
    // says the operation isn't allowed, prefer
    // REASON_OPERATION_NOT_PERMITTED.)
    REASON_VALIDATION_FAILURE = 4;

    // POLICY problem: the connector or upstream system does not permit
    // the requested operation regardless of state. Examples: cannot
    // revoke a self-managed group; cannot grant via this endpoint;
    // required capability disabled by tenant admin; feature toggle off.
    // Use this when the upstream is saying "you're not allowed to do
    // this"; use REASON_LICENSE_EXHAUSTED only for numerical capacity.
    REASON_OPERATION_NOT_PERMITTED = 5;
  }

  Reason reason = 1;

  // Human-readable detail intended for logs and admin-visible operational
  // context — not user-facing. Include the upstream error code or message
  // when available (e.g. "Okta E0000038: user 'jdoe' is SUSPENDED").
  string detail = 2;
}
