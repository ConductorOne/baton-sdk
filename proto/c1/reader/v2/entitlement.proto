syntax = "proto3";

package c1.reader.v2;

import "c1/connector/v2/entitlement.proto";
import "google/protobuf/any.proto";
import "validate/validate.proto";

option go_package = "github.com/conductorone/baton-sdk/pb/c1/reader/v2";

service EntitlementsReaderService {
  rpc GetEntitlement(EntitlementsReaderServiceGetEntitlementRequest) returns (EntitlementsReaderServiceGetEntitlementResponse);
  // ListEntitlementsByIds returns the entitlements for the supplied
  // id list. Missing ids are omitted from the response.
  rpc ListEntitlementsByIds(EntitlementsReaderServiceListEntitlementsByIdsRequest) returns (EntitlementsReaderServiceListEntitlementsByIdsResponse);
}

message EntitlementsReaderServiceGetEntitlementRequest {
  string entitlement_id = 1 [(validate.rules).string = {
    min_bytes: 1
    max_bytes: 1024
  }];
  repeated google.protobuf.Any annotations = 2;
}

message EntitlementsReaderServiceGetEntitlementResponse {
  c1.connector.v2.Entitlement entitlement = 1;
}

message EntitlementsReaderServiceListEntitlementsByIdsRequest {
  repeated string entitlement_ids = 1 [(validate.rules).repeated = {max_items: 1024}];
  repeated google.protobuf.Any annotations = 100;
}

message EntitlementsReaderServiceListEntitlementsByIdsResponse {
  repeated c1.connector.v2.Entitlement list = 1;
}
