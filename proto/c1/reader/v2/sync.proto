syntax = "proto3";

package c1.reader.v2;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";

option go_package = "github.com/conductorone/baton-sdk/pb/c1/reader/v2";

message SyncRun {
  string id = 1;
  google.protobuf.Timestamp started_at = 2;
  google.protobuf.Timestamp ended_at = 3;
  string sync_token = 4;
  string sync_type = 5;
  string parent_sync_id = 6;
  SyncStats stats = 7;
}

message SyncStats {
  int64 resource_types = 1;
  int64 resources = 2;
  int64 entitlements = 3;
  int64 grants = 4;
  map<string, int64> resources_by_resource_type = 5;
  map<string, int64> grants_by_resource_type = 6;
  map<string, int64> entitlements_by_resource_type = 7;
  int64 assets = 8;

  // Timing / call stats lifted from the syncer token at EndSync.
  // Keys match the sync-token JSON fields (e.g. "rate_limit_wait",
  // "list-grants", "get"). Compacted syncs fold partial timings into
  // the token's top-level maps at compaction time.
  map<string, int64> step_durations_ms = 9;
  map<string, CallStat> connector_call_stats = 10;
  map<string, CallStat> session_store_stats = 11;
}

// CallStat is a cumulative latency / outcome counter for one named
// operation (a connector RPC method or a session-store op). Errors and
// Timeouts are populated for session-store stats; connector call stats
// leave them at zero.
message CallStat {
  int64 count = 1;
  int64 total_ms = 2;
  int64 max_ms = 3;
  int64 errors = 4;
  int64 timeouts = 5;
}

service SyncsReaderService {
  rpc GetSync(SyncsReaderServiceGetSyncRequest) returns (SyncsReaderServiceGetSyncResponse);
  rpc ListSyncs(SyncsReaderServiceListSyncsRequest) returns (SyncsReaderServiceListSyncsResponse);
  rpc GetLatestFinishedSync(SyncsReaderServiceGetLatestFinishedSyncRequest) returns (SyncsReaderServiceGetLatestFinishedSyncResponse);
}

message SyncsReaderServiceGetSyncRequest {
  string sync_id = 1;
  repeated google.protobuf.Any annotations = 2;
}

message SyncsReaderServiceGetSyncResponse {
  SyncRun sync = 1;
  repeated google.protobuf.Any annotations = 2;
}

message SyncsReaderServiceListSyncsRequest {
  uint32 page_size = 1 [(validate.rules).uint32 = {
    ignore_empty: true
    lte: 250
  }];
  string page_token = 2 [(validate.rules).string = {
    ignore_empty: true
    min_bytes: 1
    max_bytes: 2048
  }];
  repeated google.protobuf.Any annotations = 3;
}

message SyncsReaderServiceListSyncsResponse {
  repeated SyncRun syncs = 1;
  string next_page_token = 2 [(validate.rules).string = {
    ignore_empty: true
    min_bytes: 1
    max_bytes: 2048
  }];
  repeated google.protobuf.Any annotations = 3;
}

message SyncsReaderServiceGetLatestFinishedSyncRequest {
  repeated google.protobuf.Any annotations = 1;
  string sync_type = 2;
}

message SyncsReaderServiceGetLatestFinishedSyncResponse {
  SyncRun sync = 1;
  repeated google.protobuf.Any annotations = 2;
}
